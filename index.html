<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - 1 Coríntios 2 (ACF)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: linear-gradient(135deg, #1e2b3c 0%, #0d1b2a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #2c2c2c;
        }

        .main-container {
            width: 100%;
            max-width: 650px;
            background: #fefefe;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            padding: 30px 25px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 520px;
            position: relative;
        }

        h1 {
            font-size: 1.8rem;
            color: #2e4a3a;
            margin-bottom: 4px;
            text-align: center;
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 1rem;
            color: #6b7b6b;
            margin-bottom: 20px;
            text-align: center;
            font-style: italic;
        }

        .progress-area {
            width: 100%;
            margin-bottom: 18px;
        }
        .progress-text {
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            color: #5a6b5a;
            margin-bottom: 6px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e5e0;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #4a7c59;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .question-card {
            width: 100%;
            background: #f7f9f7;
            border-radius: 16px;
            padding: 24px 20px;
            margin-bottom: 20px;
            border: 2px solid #dce4dc;
            transition: border 0.3s, background 0.3s;
            min-height: 200px;
            display: flex;
            flex-direction: column;
        }
        .question-card.correct-answer {
            border-color: #2e7d32;
            background: #edf7ed;
        }
        .question-card.incorrect-answer {
            border-color: #b71c1c;
            background: #fdecea;
        }

        .q-num {
            font-weight: 700;
            color: #4a7c59;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        .q-text {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 18px;
            line-height: 1.5;
            color: #1e2b2a;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: auto;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border: 1px solid #cbd5c0;
            border-radius: 10px;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option:hover {
            background: #eaf0ea;
            border-color: #8aa08a;
        }
        .option input[type="radio"] {
            accent-color: #4a7c59;
            width: 18px;
            height: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .option label {
            cursor: pointer;
            font-size: 1rem;
            color: #2c3a2c;
            flex: 1;
        }
        .option.selected-correct {
            background: #c8e6c9;
            border-color: #2e7d32;
        }
        .option.selected-incorrect {
            background: #ffcdd2;
            border-color: #b71c1c;
        }

        .complete-input {
            margin-top: auto;
        }
        .complete-input input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #bcc7bc;
            border-radius: 10px;
            font-size: 1rem;
            background: #fff;
            font-family: inherit;
            transition: border 0.3s;
        }
        .complete-input input:focus {
            outline: none;
            border-color: #4a7c59;
            box-shadow: 0 0 0 3px rgba(74,124,89,0.2);
        }
        .input-correct {
            border-color: #2e7d32 !important;
            background: #edf7ed;
        }
        .input-incorrect {
            border-color: #b71c1c !important;
            background: #fdecea;
        }

        .feedback-msg {
            margin-top: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            min-height: 22px;
        }
        .correct-feedback {
            color: #1e5a1e;
        }
        .incorrect-feedback {
            color: #a42828;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            width: 100%;
            justify-content: center;
        }
        .nav-btn, .action-btn {
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .nav-btn {
            background: #e8ede8;
            color: #2e4a3a;
            border: 1px solid #bcc7bc;
        }
        .nav-btn:hover:not(:disabled) {
            background: #d4ddcf;
        }
        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .action-btn {
            background: #4a7c59;
            color: white;
            box-shadow: 0 4px 12px rgba(74,124,89,0.4);
        }
        .action-btn:hover {
            background: #3a6547;
        }
        .reset-btn {
            background: #fff;
            color: #4a7c59;
            border: 2px solid #4a7c59;
            box-shadow: none;
        }
        .reset-btn:hover {
            background: #f0f5f0;
        }

        .score-area {
            margin-top: 10px;
            font-size: 1.3rem;
            font-weight: 700;
            color: #2e4a3a;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            background: #edf3ed;
            border: 1px solid #cbdccb;
            width: 100%;
            display: none;
        }

        @media (max-width: 500px) {
            .main-container {
                padding: 20px 15px;
            }
            .q-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>📖 1 Coríntios 2</h1>
        <p class="subtitle">Almeida Corrigida Fiel (ACF)</p>

        <div class="progress-area">
            <div class="progress-text" id="progress-text">Pergunta 1 de 30</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 3.333%;"></div>
            </div>
        </div>

        <div class="question-card" id="question-card">
            <!-- conteúdo dinâmico -->
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" id="prev-btn" disabled>◀ Anterior</button>
            <button class="nav-btn" id="next-btn">Próximo ▶</button>
        </div>

        <div class="nav-buttons" style="margin-top: 5px;">
            <button class="action-btn" id="check-btn">✅ Corrigir Quiz</button>
            <button class="action-btn reset-btn" id="reset-btn">🔄 Reiniciar</button>
        </div>

        <div class="score-area" id="score-area"></div>
    </div>

    <script>
        const questions = [
            { id:1, type:'mc', text:'O que Paulo anunciava quando foi a Corinto, segundo 2:1?', options:['O evangelho do reino','O testemunho de Deus','A sabedoria dos mistérios','A palavra da fé'], answer:'b' },
            { id:2, type:'mc', text:'Paulo determinou não saber coisa alguma entre os coríntios, senão...', options:['Jesus Cristo e este ressurreto','Jesus Cristo e este crucificado','A graça de Deus','O poder do Espírito'], answer:'b' },
            { id:3, type:'complete', text:'"A minha palavra, e a minha pregação, não consistiram em palavras persuasivas de sabedoria humana, mas em demonstração de ______________ e de poder;"', answer:'Espírito' },
            { id:4, type:'mc', text:'Como Paulo descreveu sua presença em Corinto? (2:3)', options:['Com autoridade e ousadia','Em fraqueza, temor e grande tremor','Com amor e paciência','Em espírito de mansidão'], answer:'b' },
            { id:5, type:'mc', text:'Por que a pregação de Paulo não foi em palavras persuasivas de sabedoria humana? (2:5)', options:['Para que cressem pelos sinais','Para que a fé se apoiasse no poder de Deus','Para que reconhecessem sua autoridade apostólica','Para que os judeus se convertessem'], answer:'b' },
            { id:6, type:'complete', text:'"Mas falamos a sabedoria de Deus em ______________, que esteve oculta, a qual Deus preordenou antes dos séculos para nossa glória;"', answer:'mistério' },
            { id:7, type:'mc', text:'Entre quem Paulo fala de sabedoria? (2:6)', options:['Os judeus','Os gregos','Os perfeitos','Os neófitos'], answer:'c' },
            { id:8, type:'mc', text:'Qual teria sido a atitude dos príncipes deste mundo se conhecessem a sabedoria de Deus? (2:8)', options:['Teriam se arrependido','Teriam adorado o Senhor da glória','Nunca crucificariam o Senhor da glória','Teriam ensinado a verdade'], answer:'c' },
            { id:9, type:'mc', text:'A citação "As coisas que o olho não viu..." refere-se ao que Deus preparou para:', options:['Todos os homens','Os que o amam','Os apóstolos','Os profetas'], answer:'b' },
            { id:10, type:'complete', text:'"Mas Deus no-las revelou pelo seu ______________; porque o Espírito penetra todas as coisas, ainda as profundezas de Deus."', answer:'Espírito' },
            { id:11, type:'mc', text:'Qual analogia Paulo usa para explicar que só o Espírito de Deus conhece as profundezas de Deus? (2:11)', options:['A do corpo e seus membros','A do espírito do homem que conhece as coisas do homem','A da semente que morre','A do oleiro e o barro'], answer:'b' },
            { id:12, type:'mc', text:'Qual espírito os crentes não receberam? (2:12)', options:['O espírito de escravidão','O espírito do mundo','O espírito de medo','O espírito de engano'], answer:'b' },
            { id:13, type:'complete', text:'"Mas nós não recebemos o espírito do mundo, mas o Espírito que provém de Deus, para que pudéssemos conhecer o que nos é dado ______________ por Deus."', answer:'gratuitamente' },
            { id:14, type:'mc', text:'Com que palavras Paulo fala as coisas que lhe foram reveladas? (2:13)', options:['Com as que a sabedoria humana ensina','Com as que o Espírito Santo ensina','Com palavras de difícil compreensão','Com segredos e enigmas'], answer:'b' },
            { id:15, type:'mc', text:'Como o homem natural considera as coisas do Espírito de Deus? (2:14)', options:['Como sabedoria profunda','Como loucura','Como mistério inacessível','Como verdade oculta'], answer:'b' },
            { id:16, type:'complete', text:'"Ora, o homem natural não compreende as coisas do Espírito de Deus, porque lhe parecem ______________; e não pode entendê-las, porque elas se discernem espiritualmente."', answer:'loucura' },
            { id:17, type:'mc', text:'Por que o homem natural não pode entender as coisas do Espírito? (2:14)', options:['Porque são muito complexas','Porque ele é pecador','Porque elas se discernem espiritualmente','Porque Deus as escondeu'], answer:'c' },
            { id:18, type:'mc', text:'Quem discerne bem tudo? (2:15)', options:['O sábio','O homem espiritual','O apóstolo','O profeta'], answer:'b' },
            { id:19, type:'complete', text:'"Mas o que é espiritual discerne ______________ tudo, e ele de ninguém é discernido."', answer:'bem' },
            { id:20, type:'mc', text:'A quem Paulo se refere na pergunta retórica: "Quem conheceu a mente do Senhor, para que possa instruí-lo?" (2:16)', options:['Aos que são espirituais','Ninguém, pois é pergunta retórica','Aos profetas','Aos que amam a Deus'], answer:'b' },
            { id:21, type:'complete', text:'"Mas nós temos a mente de ______________."', answer:'Cristo' },
            { id:22, type:'mc', text:'Como Paulo chama os coríntios em 2:1?', options:['Amados','Irmãos','Santos','Eleitos'], answer:'b' },
            { id:23, type:'mc', text:'Qual a demonstração que acompanhou a pregação de Paulo? (2:4)', options:['De milagres e prodígios','De sabedoria e eloquência','De Espírito e de poder','De amor e humildade'], answer:'c' },
            { id:24, type:'complete', text:'"Antes, como está escrito: As coisas que o olho não viu, e o ouvido não ouviu, e não subiram ao coração do homem, são as que Deus preparou para os que o ______________."', answer:'amam' },
            { id:25, type:'mc', text:'Quando Deus preordenou essa sabedoria? (2:7)', options:['Desde a fundação do mundo','Antes dos séculos','No momento da criação','Quando Israel foi escolhido'], answer:'b' },
            { id:26, type:'mc', text:'Como Paulo descreve a forma de comunicar as coisas espirituais? (2:13)', options:['Comparando as coisas espirituais com as espirituais','Usando alegorias','Interpretando as Escrituras','Falando abertamente'], answer:'a' },
            { id:27, type:'complete', text:'"A qual nenhum dos príncipes deste mundo conheceu; porque, se a conhecessem, nunca crucificariam ao Senhor da ______________."', answer:'glória' },
            { id:28, type:'mc', text:'Até onde o Espírito penetra? (2:10)', options:['Até o coração humano','Até as profundezas de Deus','Até o fim do mundo','Até os céus'], answer:'b' },
            { id:29, type:'mc', text:'O que nos é dado gratuitamente por Deus e podemos conhecer pelo Espírito? (2:12)', options:['A lei','As coisas que nos foram dadas','Os mistérios do reino','O conhecimento do bem e do mal'], answer:'b' },
            { id:30, type:'complete', text:'"E eu, irmãos, quando vim ter convosco, anunciando-vos o ______________ de Deus, não vim com sublimidade de palavras ou de sabedoria."', answer:'testemunho' }
        ];

        let currentIndex = 0;
        let userAnswers = new Array(30).fill(null);
        let quizChecked = false;

        const questionCard = document.getElementById('question-card');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const checkBtn = document.getElementById('check-btn');
        const resetBtn = document.getElementById('reset-btn');
        const scoreArea = document.getElementById('score-area');
        const progressText = document.getElementById('progress-text');
        const progressFill = document.getElementById('progress-fill');

        function normalize(str) {
            return str.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        }

        function saveCurrentAnswer() {
            const q = questions[currentIndex];
            if (q.type === 'mc') {
                const selected = document.querySelector(`input[name="q${q.id}"]:checked`);
                userAnswers[currentIndex] = selected ? selected.value : null;
            } else if (q.type === 'complete') {
                const input = document.getElementById(`q${q.id}_input`);
                userAnswers[currentIndex] = input ? input.value : '';
            }
        }

        function renderQuestion(index) {
            const q = questions[index];
            let html = '';
            html += `<div class="q-num">Pergunta ${q.id}</div>`;
            html += `<div class="q-text">${q.text}</div>`;

            if (q.type === 'mc') {
                html += `<div class="options">`;
                const letters = ['a','b','c','d'];
                q.options.forEach((opt, i) => {
                    const checked = (userAnswers[index] === letters[i]) ? 'checked' : '';
                    html += `
                        <div class="option" id="opt-${q.id}-${letters[i]}">
                            <input type="radio" name="q${q.id}" id="q${q.id}_${letters[i]}" value="${letters[i]}" ${checked}>
                            <label for="q${q.id}_${letters[i]}">${letters[i]}) ${opt}</label>
                        </div>`;
                });
                html += `</div>`;
                html += `<div class="feedback-msg" id="feedback-${q.id}"></div>`;
            } else if (q.type === 'complete') {
                const savedValue = userAnswers[index] || '';
                html += `<div class="complete-input">`;
                html += `<input type="text" id="q${q.id}_input" placeholder="Digite a palavra..." value="${escapeHtml(savedValue)}">`;
                html += `</div>`;
                html += `<div class="feedback-msg" id="feedback-${q.id}"></div>`;
            }

            questionCard.innerHTML = html;

            // Se quizChecked, aplicar classes visuais de correção
            if (quizChecked) {
                applyCorrectionVisuals(index);
            }

            // Atualizar progresso
            progressText.textContent = `Pergunta ${index+1} de 30`;
            progressFill.style.width = ((index+1)/30*100) + '%';

            // Habilitar/desabilitar botões
            prevBtn.disabled = (index === 0);
            nextBtn.disabled = (index === 29);
        }

        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function applyCorrectionVisuals(index) {
            const q = questions[index];
            const userAns = userAnswers[index];
            let isCorrect = false;
            if (q.type === 'mc') {
                isCorrect = (userAns === q.answer);
            } else if (q.type === 'complete') {
                if (userAns === null || userAns === undefined) userAns = '';
                isCorrect = (normalize(userAns) === normalize(q.answer));
            }

            const card = document.getElementById('question-card');
            card.classList.remove('correct-answer', 'incorrect-answer');
            if (isCorrect) {
                card.classList.add('correct-answer');
            } else {
                card.classList.add('incorrect-answer');
            }

            const feedbackDiv = document.getElementById(`feedback-${q.id}`);
            if (feedbackDiv) {
                if (isCorrect) {
                    feedbackDiv.innerHTML = '<span class="correct-feedback">✔ Correto!</span>';
                } else {
                    let correctInfo = '';
                    if (q.type === 'mc') {
                        const letter = q.answer.toUpperCase();
                        const correctOption = q.options[q.answer.charCodeAt(0)-97];
                        correctInfo = `Resposta correta: ${letter}) ${correctOption}`;
                    } else {
                        correctInfo = `Resposta: "${q.answer}"`;
                    }
                    feedbackDiv.innerHTML = `<span class="incorrect-feedback">✘ Incorreto. ${correctInfo}</span>`;
                }
            }

            // Destacar opções no MC
            if (q.type === 'mc') {
                const letters = ['a','b','c','d'];
                letters.forEach(letter => {
                    const optDiv = document.getElementById(`opt-${q.id}-${letter}`);
                    if (optDiv) {
                        optDiv.classList.remove('selected-correct', 'selected-incorrect');
                    }
                });
                // Destacar a escolhida e a correta
                if (userAns && userAns !== q.answer) {
                    const selectedOpt = document.getElementById(`opt-${q.id}-${userAns}`);
                    if (selectedOpt) selectedOpt.classList.add('selected-incorrect');
                }
                const correctOpt = document.getElementById(`opt-${q.id}-${q.answer}`);
                if (correctOpt) correctOpt.classList.add('selected-correct');
            } else if (q.type === 'complete') {
                const input = document.getElementById(`q${q.id}_input`);
                if (input) {
                    input.classList.remove('input-correct', 'input-incorrect');
                    if (isCorrect) {
                        input.classList.add('input-correct');
                    } else {
                        input.classList.add('input-incorrect');
                    }
                }
            }
        }

        function calculateScore() {
            let score = 0;
            questions.forEach((q, idx) => {
                const userAns = userAnswers[idx];
                if (q.type === 'mc') {
                    if (userAns === q.answer) score++;
                } else if (q.type === 'complete') {
                    if (userAns && normalize(userAns) === normalize(q.answer)) score++;
                }
            });
            return score;
        }

        function checkQuiz() {
            saveCurrentAnswer();
            quizChecked = true;
            // Re-renderizar a pergunta atual com os visuais de correção
            renderQuestion(currentIndex);
            const score = calculateScore();
            scoreArea.style.display = 'block';
            scoreArea.innerHTML = `📊 Sua pontuação: ${score} de 30 (${Math.round(score/30*100)}%)`;
        }

        function resetQuiz() {
            userAnswers = new Array(30).fill(null);
            quizChecked = false;
            currentIndex = 0;
            scoreArea.style.display = 'none';
            scoreArea.innerHTML = '';
            // Limpar classes do card
            questionCard.classList.remove('correct-answer', 'incorrect-answer');
            renderQuestion(0);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Event listeners
        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                saveCurrentAnswer();
                currentIndex--;
                renderQuestion(currentIndex);
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < 29) {
                saveCurrentAnswer();
                currentIndex++;
                renderQuestion(currentIndex);
            }
        });

        checkBtn.addEventListener('click', checkQuiz);
        resetBtn.addEventListener('click', resetQuiz);

        // Salvar resposta ao trocar de opção (para não perder ao navegar sem botão)
        document.addEventListener('change', (e) => {
            if (e.target && e.target.matches('input[type="radio"]')) {
                const name = e.target.name;
                if (name && name.startsWith('q')) {
                    const qId = parseInt(name.replace('q', ''));
                    const qIndex = questions.findIndex(q => q.id === qId);
                    if (qIndex !== -1 && qIndex === currentIndex) {
                        userAnswers[currentIndex] = e.target.value;
                    }
                }
            }
        });

        // Salvar input ao digitar
        document.addEventListener('input', (e) => {
            if (e.target && e.target.matches('input[type="text"]')) {
                const id = e.target.id;
                if (id && id.endsWith('_input')) {
                    const qId = parseInt(id.replace('q', '').replace('_input', ''));
                    const qIndex = questions.findIndex(q => q.id === qId);
                    if (qIndex !== -1 && qIndex === currentIndex) {
                        userAnswers[currentIndex] = e.target.value;
                    }
                }
            }
        });

        // Renderizar primeira pergunta
        renderQuestion(0);
    </script>
</body>
</html>
